<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>出租屋管理 - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-6">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">🏠</div>
            <h1 class="text-2xl font-bold text-gray-800">出租屋管理站</h1>
            <p class="text-sm text-gray-500 mt-1">请登录后使用</p>
        </div>

        <form method="post" action="/login" class="bg-white rounded-2xl shadow-sm p-6 space-y-4">
            {% if error %}
            <div class="bg-red-50 text-red-600 text-sm text-center py-2 px-3 rounded-lg">{{ error }}</div>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-600 mb-1.5">管理密码</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 outline-none transition-all text-center text-lg"
                       placeholder="请输入密码">
            </div>

            <button type="submit" class="w-full py-3 px-4 rounded-xl font-medium text-white bg-blue-600 hover:bg-blue-700 transition-all active:scale-[0.98]">
                进入管理站
            </button>
        </form>
    </div>
</body>
</html>
